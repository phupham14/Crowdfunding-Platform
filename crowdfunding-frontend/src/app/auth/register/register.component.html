<section class="auth-page">
  <div class="auth-card">
    <h2>Đăng ký tài khoản</h2>

    <form (ngSubmit)="onRegister()" [formGroup]="registerForm">
      <!-- SUCCESS -->
      <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <!-- ERROR -->
      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" formControlName="full_name" placeholder="Nhập họ và tên" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Nhập email" />
      </div>

      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" formControlName="phone" placeholder="Nhập số điện thoại" />
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" formControlName="password" placeholder="Nhập mật khẩu" />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Đang đăng ký...' : 'Đăng ký' }}
      </button>
    </form>
  </div>
</section>
