<h2>System Reports</h2>

<div *ngIf="loading">Loading...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="report" class="report-grid">

  <div class="card">
    <h3>Total Users</h3>
    <p>{{ report.total_users }}</p>
  </div>

  <div class="card">
    <h3>Total Projects</h3>
    <p>{{ report.total_projects }}</p>
  </div>

  <div class="card">
    <h3>Total Transactions</h3>
    <p>{{ report.total_transactions }}</p>
  </div>

  <div class="card">
    <h3>Total Money Flow</h3>
    <p>{{ report.total_money_flow | currency:'VND':'symbol':'1.0-0' }}</p>
  </div>

</div>

<!-- Chart -->
<h3>System Report Chart</h3>
<div *ngIf="report" class="chart-wrapper">
  <canvas id="systemReportChart"></canvas>
</div>
