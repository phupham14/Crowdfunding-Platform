<h2>Transaction Monitoring</h2>

<div class="filters">
  <select [(ngModel)]="filterStatus" (change)="onFilterChange()">
    <option value="">All Status</option>
    <option value="SUCCESS">Success</option>
    <option value="FAILED">Failed</option>
  </select>

  <select [(ngModel)]="filterType" (change)="onFilterChange()">
    <option value="">All Types</option>
    <option value="FUND_IN">Fund In</option>
    <option value="INVEST">Invest</option>
    <option value="WITHDRAW">Withdraw</option>
  </select>
</div>

<div *ngIf="loading" class="loading">Loading...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<table *ngIf="!loading && transactions.length" class="transaction-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>User</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Created At</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let tx of transactions">
      <td>{{ tx.id }}</td>
      <td>{{ tx.user_email || tx.user }}</td>
      <td>{{ tx.type }}</td>
      <td>{{ tx.amount | number }}</td>
      <td>
        <span class="status" [ngClass]="tx.status.toLowerCase()">
          {{ tx.status }}
        </span>
      </td>
      <td>{{ tx.created_at | date:'short' }}</td>
    </tr>
  </tbody>
</table>

<div class="pagination">
  <button
    [disabled]="currentPage === 1"
    (click)="loadTransactions(currentPage - 1)">
    ◀ Prev
  </button>

  <span>
    Page {{ currentPage }} / {{ totalPages }}
  </span>

  <button
    [disabled]="currentPage === totalPages"
    (click)="loadTransactions(currentPage + 1)">
    Next ▶
  </button>
</div>

<div *ngIf="!loading && transactions.length === 0">
  Không có transaction nào.
</div>
