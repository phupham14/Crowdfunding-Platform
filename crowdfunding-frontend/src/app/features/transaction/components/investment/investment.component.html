<div class="investment-overlay">
  <div class="investment-modal">
    <h2>Invest in {{ project.name }}</h2>

    <p class="project-goal">
      Raised: {{ project.raised | currency:'VND' }} /
      Goal: {{ project.funding_target | currency:'VND' }}
    </p>

    <div class="wallet-message error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="wallet-message success" *ngIf="successMessage">{{ successMessage }}</div>

    <div class="input-group">
      <label for="amount">Amount to Invest</label>
      <input
        type="number"
        id="amount"
        [(ngModel)]="amount"
        min="1"
        placeholder="Enter amount"
      />
    </div>

    <div class="modal-actions">
      <button class="confirm" (click)="confirmInvestment()">Confirm</button>
      <button class="cancel" (click)="close.emit()">Cancel</button>
    </div>
  </div>
</div>
