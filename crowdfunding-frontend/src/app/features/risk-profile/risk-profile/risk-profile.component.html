<div class="risk-profile-card" *ngIf="profile || editing">
  <h2>Risk Profile</h2>

  <form [formGroup]="riskForm" (ngSubmit)="onCalculate()">
    <div class="form-group">
      <label>Age</label>
      <input type="number" formControlName="age" />
    </div>

    <div class="form-group">
      <label>Annual Income (mil VND)</label>
      <input type="number" formControlName="annual_income_vnd_mil" />
    </div>

    <div class="form-group">
      <label>Investment Experience (years)</label>
      <input type="number" formControlName="invest_experience_years" />
    </div>

    <div class="form-group">
      <label>Risk Survey Raw</label>
      <input type="number" formControlName="risk_survey_raw" />
    </div>

    <div class="form-group">
      <label>Volatility Tolerance Raw</label>
      <input type="number" formControlName="volatility_tolerance_raw" />
    </div>

    <div class="form-group">
      <label>Trades per Month</label>
      <input type="number" formControlName="freq_trades_per_month" />
    </div>

    <div class="form-group">
      <label>Max Drawdown Tolerance (%)</label>
      <input type="number" formControlName="max_drawdown_tol_pct" />
    </div>

    <div class="form-group">
      <label>Diversification Level (0-1)</label>
      <input type="number" step="0.01" formControlName="diversification_level" />
    </div>

    <div class="form-group">
      <label>Has Leverage</label>
      <select formControlName="has_leverage">
        <option [value]="0">No</option>
        <option [value]="1">Yes</option>
      </select>
    </div>

    <div class="form-group">
      <label>Crypto Exposure (%)</label>
      <input type="number" formControlName="crypto_exposure_pct" />
    </div>

    <div class="form-group">
      <label>Investment Horizon (years)</label>
      <input type="number" formControlName="horizon_years" />
    </div>

    <div class="form-group">
      <label>Liquidity Need Level (0-1)</label>
      <input type="number" step="0.01" formControlName="liquidity_need_level" />
    </div>

    <div class="button-group">
      <button type="submit" class="btn-calc">Tính lại</button>
      <button type="button" class="btn-confirm" (click)="onConfirm()" [disabled]="!calculated">
        Xác nhận
      </button>
    </div>
  </form>

  <div *ngIf="calculated" class="result">
    <p><strong>Base Score:</strong> {{ profile.base_score }}</p>
    <p><strong>Risk Tier:</strong> {{ profile.risk_tier }}</p>
  </div>
</div>
