<h2>Portfolio Report</h2>

<div class="summary">
  <div class="card">
    <h3>Total Invested</h3>
    <p>{{ totalInvested | currency:'VND' }}</p>
  </div>
  <div class="card">
    <h3>Investment Count</h3>
    <p>{{ investmentCount }}</p>
  </div>
</div>

<h3>Investment Allocation</h3>
<div style="max-width: 400px; margin-bottom: 2rem;">
  <canvas baseChart
          [data]="allocationData"
          [options]="allocationOptions"
          chartType="pie">
  </canvas>
</div>

<h3>Investment List</h3>
<table>
  <thead>
    <tr>
      <th>Project</th>
      <th>Name</th>
      <th>Amount</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let inv of investments">
      <td>{{ inv.project_id }}</td>
      <td>{{ inv.project_name }}</td>
      <td>{{ inv.amount | currency:'VND' }}</td>
      <td>{{ inv.created_at | date:'short' }}</td>
    </tr>
  </tbody>
</table>
