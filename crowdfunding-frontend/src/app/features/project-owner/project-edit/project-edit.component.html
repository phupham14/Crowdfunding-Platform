<div class="project-edit">
    <h2>Update Project</h2>

    <div *ngIf="successMessage" class="alert success">
        {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert error">
        {{ errorMessage }}
    </div>

    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Project Title</label>
            <input type="text" formControlName="name" />
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea rows="4" formControlName="description"></textarea>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" formControlName="category" />
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" formControlName="location" />
        </div>

        <div class="form-group">
            <label>Funding Target</label>
            <input type="number" formControlName="funding_target" />
        </div>

        <div class="form-group">
            <label>Minimum Investment Amount (VND)</label>
            <input type="number" formControlName="min_invest_amount" />
        </div>

        <div class="form-group">
            <label>Maximum Investment Amount (Optional)</label>
            <input type="number" formControlName="max_invest_amount" />
        </div>

        <div class="form-group">
            <label>Funding Start Date</label>
            <input type="date" formControlName="start_at" />
        </div>

        <div class="form-group">
            <label>Funding End Date</label>
            <input type="date" formControlName="end_at" />
        </div>

        <button type="submit" [disabled]="loading">
            {{ loading ? 'Saving...' : 'Update Project' }}
        </button>
    </form>
</div>
